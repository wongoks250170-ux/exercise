<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프하이크 (SafeHike)</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --warning-color: #d32f2f;
            --caution-color: #f57c00;
            --safe-color: #388e3c;
            --bg-color: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
        }

        header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 8px solid #ccc;
        }

        .card.danger { border-left-color: var(--warning-color); }
        .card.warning { border-left-color: var(--caution-color); }
        .card.safe { border-left-color: var(--safe-color); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.3rem;
            color: #111;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .badge.danger { background-color: var(--warning-color); }
        .badge.warning { background-color: var(--caution-color); }
        .badge.safe { background-color: var(--safe-color); }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .info-item span {
            font-weight: bold;
            color: #666;
        }

        .guide-box {
            background-color: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .guide-box h4 {
            margin: 0 0 0.5rem 0;
            color: #b78103;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .guide-box ul {
            margin: 0;
            padding-left: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .no-result {
            text-align: center;
            padding: 3rem;
            color: #777;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>⛰️ 세이프하이크 (SafeHike)</h1>
        <p>등산로 야생동물·뱀 출몰 정보 및 안전 사전</p>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="산 이름이나 지역명을 입력하세요 (예: 수원시, 안산시, 광교산)">
            <button id="searchBtn">검색</button>
        </div>

        <div id="resultContainer"></div>
    </div>

    <script>
        // 공공데이터 기반 통합 데이터셋 (안산시 데이터까지 추가 완료)
        const regionalData = [
            {
                location: "수원시 광교산",
                region: "경기도 수원시 장안구",
                level: "warning",
                levelText: "주의",
                wildlife: "멧돼지 목격, 벌집 제거 출동 빈번",
                source: "경기도 벌집 제거 출동 현황 통계 반영",
                recentCount: "최근 3개월 내 벌집 제거 14건, 멧돼지 목격 2건",
                guides: [
                    "벌을 만났을 때는 머리를 감싸고 신속하게 20m 이상 벗어나세요.",
                    "탄산음료나 향수는 벌을 자극할 수 있으니 지참을 자제하세요.",
                    "멧돼지와 마주쳤을 때는 소리를 지르지 말고 주위의 나무나 바위 뒤로 숨으세요."
                ]
            },
            {
                location: "성남시 청계산",
                region: "경기도 성남시 수정구",
                level: "danger",
                levelText: "위험",
                wildlife: "살모사(뱀) 출몰, 벌집 제거",
                source: "경기도 벌집 제거 통계 및 인근 고속도로 로드킬 데이터",
                recentCount: "최근 3개월 내 뱀 출몰 신고 5건, 벌집 제거 22건",
                guides: [
                    "지정된 등산로를 벗어나 풀숲으로 들어가지 마세요.",
                    "반려견과 동행 시 반드시 리드줄을 짧게 잡고 풀숲 접근을 막으세요.",
                    "뱀에 물렸을 때는 물린 부위를 심장보다 낮게 유지하고 즉시 119에 신고하세요."
                ]
            },
            {
                location: "안산시 수리산 (수암봉)",
                region: "경기도 안산시 상록구",
                level: "warning",
                levelText: "주의",
                wildlife: "뱀(살모사), 벌집 제거 출동 이력",
                source: "경기도 벌집 제거 출동 현황 및 지자체 통계 반영",
                recentCount: "최근 3개월 내 벌집 제거 8건, 뱀 목격 신고 1건",
                guides: [
                    "등산로 정비를 위해 풀을 벤 곳이나 바위 틈을 지날 때 발밑을 주의하세요.",
                    "지정된 등산로로만 보행하고, 야간 등산은 자제하는 것이 좋습니다.",
                    "반려견과 함께 산행 시 수풀 속으로 들어가지 않도록 리드줄을 통제하세요."
                ]
            },
            {
                location: "안산시 광덕산",
                region: "경기도 안산시 단원구",
                level: "safe",
                levelText: "보통",
                wildlife: "특이 유해동물 없음",
                source: "경기도 공공데이터 종합",
                recentCount: "최근 3개월 내 특이 사고 및 119 출동 없음",
                guides: [
                    "일반적인 등산 안전 수칙을 준수하세요.",
                    "여름철 산행 시 모기 및 진드기 기피제를 사용하면 도움이 됩니다."
                ]
            }
        ];

        // 카드 렌더링 함수
        function renderCards(data) {
            const container = document.getElementById('resultContainer');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="no-result">
                        <h3>🔍 검색 결과가 없습니다.</h3>
                        <p style="margin-top:10px; color:#666;">'수원시' 또는 '안산시'를 입력해 보세요!<br>데이터에 등록된 지역 정보만 검색이 가능합니다.</p>
                    </div>
                `;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${item.level}`;
                const guideList = item.guides.map(g => `<li>${g}</li>`).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${item.location}</h3>
                        <span class="badge ${item.level}">${item.levelText}</span>
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><span>행정 구역:</span> ${item.region}</div>
                        <div class="info-item"><span>주요 유해 생물:</span> ${item.wildlife}</div>
                        <div class="info-item" style="grid-column: span 2;"><span>출몰 및 출동 기록:</span> ${item.recentCount}</div>
                        <div class="info-item" style="grid-column: span 2; font-size: 0.8rem; color: #999;">※ 출처: ${item.source}</div>
                    </div>
                    <div class="guide-box">
                        <h4>💡 행동 요령 및 안전 수칙</h4>
                        <ul>${guideList}</ul>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 검색 로직 개선 함수
        function searchData() {
            const query = document.getElementById('searchInput').value.trim();
            
            // 검색어가 비어있으면 전체 데이터 보여주기
            if (query === '') {
                renderCards(regionalData);
                return;
            }

            // 공백 제거 및 문자열 비교로 매칭률 향상
            const filtered = regionalData.filter(item => {
                const targetLocation = item.location.replace(/\s+/g, '');
                const targetRegion = item.region.replace(/\s+/g, '');
                const cleanQuery = query.replace(/\s+/g, '');

                return targetLocation.includes(cleanQuery) || targetRegion.includes(cleanQuery);
            });

            renderCards(filtered);
        }

        // 이벤트 리스너 등록
        document.getElementById('searchBtn').addEventListener('click', searchData);
        document.getElementById('searchInput').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                searchData();
            }
        });

        // 앱 처음 켰을 때 초기 화면으로 전체 데이터 띄워주기
        window.onload = function() {
            renderCards(regionalData);
        };
    </script>
</body>
</html>
