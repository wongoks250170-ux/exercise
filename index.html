<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHike - 안산시 공공데이터 안전 지도</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --danger-color: #c62828;
            --warning-color: #ef6c00;
            --background-color: #f5f5f5;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: #333;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1.2rem;
        }

        header h1 { margin: 0; font-size: 1.6rem; }
        header p { margin: 0.4rem 0 0 0; font-size: 0.85rem; opacity: 0.9; }

        .container {
            max-width: 600px;
            margin: 15px auto;
            padding: 0 15px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .search-box button {
            padding: 12px 18px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 공공데이터 자체 렌더링 지도 영역 */
        .map-canvas-container {
            width: 100%;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .map-canvas-container h4 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: #666;
        }

        /* SVG로 그린 가상 지도 */
        .custom-map {
            width: 100%;
            height: 250px;
            background-color: #e8f5e9;
            border-radius: 8px;
            border: 1px solid #c8e6c9;
        }

        .map-point {
            fill: #c62828;
            cursor: pointer;
            transition: r 0.2s;
        }

        .map-point:hover {
            r: 12;
            fill: #ff8f00;
        }

        .map-text {
            font-size: 12px;
            font-weight: bold;
            fill: #333;
            pointer-events: none;
        }

        /* 결과 카드 스타일 */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 15px;
            display: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .location-name { font-size: 1.3rem; font-weight: bold; margin: 0; }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .badge.danger { background-color: var(--danger-color); }
        .badge.warning { background-color: var(--warning-color); }

        .info-row {
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .info-label { font-weight: bold; color: #555; }

        .guide-box {
            background-color: #fff9c4;
            border-left: 5px solid #fbc02d;
            padding: 12px 15px;
            border-radius: 4px;
            margin-top: 15px;
        }
