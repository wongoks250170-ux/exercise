<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프하이크 (SafeHike)</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --warning-color: #d32f2f;
            --caution-color: #f57c00;
            --safe-color: #388e3c;
            --bg-color: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
        }

        header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .search-box button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 8px solid #ccc;
        }

        .card.danger { border-left-color: var(--warning-color); }
        .card.warning { border-left-color: var(--caution-color); }
        .card.safe { border-left-color: var(--safe-color); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.3rem;
            color: #111;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .badge.danger { background-color: var(--warning-color); }
        .badge.warning { background-color: var(--caution-color); }
        .badge.safe { background-color: var(--safe-color); }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .info-item span {
            font-weight: bold;
            color: #666;
        }

        .guide-box {
            background-color: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .guide-box h4 {
            margin: 0 0 0.5rem 0;
            color: #b78103;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .guide-box ul {
            margin: 0;
            padding-left: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .no-result {
            text-align: center;
            padding: 3rem;
            color: #777;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>⛰️ 세이프하이크 (SafeHike)</h1>
        <p>등산로 야생동물·뱀 출몰 정보 및 안전 사전</p>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="지역이나 산 이름을 입력하세요 (예: 안산시, 광교산, 수리산)">
            <button id="searchBtn">검색</button>
        </div>

        <div id="resultContainer"></div>
